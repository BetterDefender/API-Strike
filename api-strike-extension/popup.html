<!DOCTYPE html>
<html>
<head>
  <style>
    :root {
      --bg: #ffffff;
      --header-bg: #f8f9fa;
      --border: #e0e0e0;
      --text: #333333;
      --accent: #007bff;
      --live-label: #28a745;
      --disc-label: #fd7e14;
      --tab-inactive: #6c757d;
    }
    body {
      width: 480px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      color: var(--text);
      background: var(--bg);
    }
    .header {
      padding: 12px;
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .title {
      font-size: 16px;
      font-weight: bold;
      color: var(--accent);
    }
    .search-box {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 14px;
      margin-bottom: 8px;
    }

    /* Tabs Styling */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: #fff;
    }
    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--tab-inactive);
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      background: #f0f7ff;
    }
    .tab:hover:not(.active) {
      background: #f8f9fa;
    }

    #url-list {
      list-style: none;
      padding: 0;
      margin: 0;
      max-height: 400px;
      overflow-y: auto;
    }
    .url-item {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: background 0.2s;
    }
    .url-item:hover {
      background-color: #f1f3f5;
    }
    .url-path {
      word-break: break-all;
      font-size: 12px;
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-weight: 500;
    }
    .url-meta {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .label {
      font-size: 9px;
      font-weight: bold;
      padding: 1px 5px;
      border-radius: 3px;
      color: white;
      text-transform: uppercase;
    }
    .label-live { background: var(--live-label); }
    .label-disc { background: var(--disc-label); }

    .full-url {
      font-size: 11px;
      color: #777;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .controls {
      display: flex;
      gap: 8px;
    }
    button {
      padding: 6px 10px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: white;
      border-radius: 4px;
      font-size: 11px;
      transition: all 0.2s;
    }
    button:hover {
      background: #f8f9fa;
    }
    #clear { color: #dc3545; }

    .status {
      font-size: 11px;
      color: var(--accent);
      height: 16px;
      text-align: center;
      margin-top: 4px;
    }
    .empty-state {
      padding: 40px;
      text-align: center;
      color: #888;
      font-style: italic;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-top">
      <div class="title">API-Strike</div>
      <div class="controls">
        <button id="copy-all">Copy All</button>
        <button id="clear">Clear</button>
      </div>
    </div>
    <input type="text" id="search" class="search-box" placeholder="Filter endpoints..." autofocus>
    <div class="status" id="status"></div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="internal">Current Domain</div>
    <div class="tab" data-tab="external">External Domains</div>
  </div>

  <ul id="url-list">
    <div class="empty-state">No endpoints captured yet.</div>
  </ul>
  <script src="popup.js"></script>
</body>
</html>
